<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primetrade | Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Primetrade Task Manager</h1>
    <div>
      <span id="current-user" style="margin-right: 16px; font-size: 13px"></span>
      <button id="logout-btn">Logout</button>
    </div>
  </header>

  <div class="dashboard-container">
    <div id="task-message" class="message"></div>

    <div class="card">
      <h2>Add Task</h2>
      <form id="create-task-form">
        <div class="task-form-row">
          <div>
            <label for="new-task-title">Title</label>
            <input type="text" id="new-task-title" maxlength="255" required />
          </div>
          <div>
            <label for="new-task-description">Description</label>
            <input type="text" id="new-task-description" maxlength="5000" />
          </div>
          <div>
            <label for="new-task-status">Status</label>
            <select id="new-task-status">
              <option value="todo">Todo</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <button type="submit">Add Task</button>
        </div>
      </form>
    </div>

    <div class="filters">
      <select id="status-filter">
        <option value="">All statuses</option>
        <option value="todo">Todo</option>
        <option value="in_progress">In Progress</option>
        <option value="done">Done</option>
      </select>
      <input type="text" id="search-input" placeholder="Search tasks..." />
    </div>

    <div id="task-list" class="task-list"></div>

    <div class="pagination">
      <button id="prev-page" class="secondary">Previous</button>
      <span id="page-info"></span>
      <button id="next-page" class="secondary">Next</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/tasks.js"></script>
</body>
</html>
